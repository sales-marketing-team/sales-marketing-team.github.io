<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advertising & Partnership Inquiry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 40px;
      color: #1a1a1a;
    }

    .container {
      max-width: 860px;
      margin: auto;
      background: #ffffff;
      padding: 40px 50px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }

    h2 {
      font-size: 18px;
      margin-top: 40px;
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      margin-top: 18px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
      transition: 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #4c6fff;
      outline: none;
      box-shadow: 0 0 0 2px rgba(76,111,255,0.1);
    }

    textarea {
      min-height: 120px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .radio-group {
      margin-top: 10px;
    }

    .radio-group label {
      font-weight: normal;
      display: block;
      margin: 6px 0;
    }

    .checkbox {
      margin-top: 20px;
      display: flex;
      align-items: center;
    }

    .checkbox input {
      width: auto;
      margin-right: 10px;
    }

    .submit-btn {
      margin-top: 30px;
      width: 100%;
      padding: 14px;
      background: #4c6fff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .submit-btn:hover {
      background: #3b57d1;
    }

    .note {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Advertising & Partnership Inquiry</h1>
  <div class="subtitle">
    Unlock data-driven marketing opportunities with Impress Media
  </div>

  <form>

    <!-- Contact Info -->
    <h2>Contact Information</h2>
    <div class="grid">
      <div>
        <label>Full Name *</label>
        <input type="text" required>
      </div>
      <div>
        <label>Company / Organization *</label>
        <input type="text" required>
      </div>
      <div>
        <label>Job Title</label>
        <input type="text">
      </div>
      <div>
        <label>Business Email *</label>
        <input type="email" required>
      </div>
      <div class="full">
        <label>Phone Number</label>
        <input type="tel">
      </div>
    </div>

    <!-- Intent -->
    <h2>Business Objective</h2>
    <label>What best describes your objective? *</label>
    <select required>
      <option value="">Select one</option>
      <option>Launch a new campaign</option>
      <option>Lead generation</option>
      <option>Brand awareness</option>
      <option>Event promotion</option>
      <option>Content marketing</option>
      <option>Market research</option>
      <option>Other</option>
    </select>

    <!-- Project -->
    <h2>Project Overview</h2>
    <div class="grid">
      <div>
        <label>Target Audience</label>
        <input type="text" placeholder="Industry / Role / Region">
      </div>
      <div>
        <label>Budget Range</label>
        <select>
          <option>Select</option>
          <option>Under $10K</option>
          <option>$10K–50K</option>
          <option>$50K+</option>
        </select>
      </div>
      <div>
        <label>Timeline</label>
        <select>
          <option>Select</option>
          <option>Immediate</option>
          <option>1–3 months</option>
          <option>3–6 months</option>
        </select>
      </div>
      <div>
        <label>Channels of Interest</label>
        <input type="text" placeholder="Display / Email / Event etc.">
      </div>
      <div class="full">
        <label>Key Message / Value Proposition</label>
        <textarea></textarea>
      </div>
    </div>

    <!-- Additional -->
    <h2>Additional Details</h2>
    <textarea placeholder="Include KPIs, target companies, or specific requests"></textarea>

    <!-- Consent -->
    <div class="checkbox">
      <input type="checkbox" required>
      <label>
        I agree to the processing of my personal data in accordance with the Privacy Policy.
      </label>
    </div>

    <button class="submit-btn">Start the Conversation →</button>

  </form>
</div>

</body>
</html>
